# =============================================================================
# Nginx configuration for ClearPath EDI Portal — local development
# =============================================================================
# Serves the static frontend and proxies /api/* to the backend container.
# Mount this file as /etc/nginx/conf.d/default.conf inside the nginx container.
# =============================================================================

# ---------------------------------------------------------------------------
# Gzip compression
# ---------------------------------------------------------------------------
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_buffers 16 8k;
gzip_http_version 1.1;
gzip_min_length 256;
gzip_types
  text/plain
  text/css
  text/javascript
  text/xml
  text/x-component
  application/json
  application/javascript
  application/x-javascript
  application/xml
  application/rss+xml
  application/atom+xml
  application/vnd.ms-fontobject
  font/truetype
  font/opentype
  image/svg+xml;

# ---------------------------------------------------------------------------
# Server block
# ---------------------------------------------------------------------------
server {
  listen 80;
  server_name localhost;

  # Document root for static assets
  root /usr/share/nginx/html;
  index index.html;

  # -------------------------------------------------------------------------
  # Security headers (lightweight — full CSP should be set in production)
  # -------------------------------------------------------------------------
  add_header X-Content-Type-Options  "nosniff"         always;
  add_header X-Frame-Options         "SAMEORIGIN"      always;
  add_header X-XSS-Protection        "1; mode=block"   always;
  add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

  # -------------------------------------------------------------------------
  # Cache-control rules
  # HTML files — never cache (ensures users always get the latest SPA shell)
  # -------------------------------------------------------------------------
  location ~* \.html$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma        "no-cache";
    add_header Expires       "0";
    try_files $uri $uri/ /index.html;
  }

  # -------------------------------------------------------------------------
  # Hashed static assets — cache for 1 year (immutable)
  # Matches filenames like main.a1b2c3d4.js, styles.abc123.css
  # -------------------------------------------------------------------------
  location ~* \.[0-9a-f]{8,}\.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
    try_files $uri =404;
  }

  # -------------------------------------------------------------------------
  # Other static assets — cache for 1 hour, must revalidate
  # -------------------------------------------------------------------------
  location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp|map)$ {
    add_header Cache-Control "public, max-age=3600, must-revalidate";
    access_log off;
    try_files $uri =404;
  }

  # -------------------------------------------------------------------------
  # API reverse proxy — forward /api/* to the backend service
  # -------------------------------------------------------------------------
  location /api/ {
    proxy_pass         http://backend:8080/api/;
    proxy_http_version 1.1;

    # Required for WebSocket / keep-alive connections
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";

    # Pass real client information to the backend
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # Timeouts — EDI round-trips can be slow
    proxy_connect_timeout  30s;
    proxy_send_timeout     120s;
    proxy_read_timeout     120s;

    # Buffer tuning
    proxy_buffering         on;
    proxy_buffer_size       16k;
    proxy_buffers           4 32k;
    proxy_busy_buffers_size 64k;
  }

  # -------------------------------------------------------------------------
  # Health-check endpoint (for Docker healthcheck / load balancer probes)
  # -------------------------------------------------------------------------
  location /health {
    access_log off;
    return 200 "OK\n";
    add_header Content-Type text/plain;
  }

  # -------------------------------------------------------------------------
  # SPA fallback — send all unmatched paths to index.html so the React /
  # Vue / vanilla-JS router can handle client-side navigation.
  # -------------------------------------------------------------------------
  location / {
    try_files $uri $uri/ /index.html;
  }

  # -------------------------------------------------------------------------
  # Deny access to dot-files (.env, .git, etc.)
  # -------------------------------------------------------------------------
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }

  # -------------------------------------------------------------------------
  # Error pages
  # -------------------------------------------------------------------------
  error_page 404 /index.html;
  error_page 500 502 503 504 /50x.html;
  location = /50x.html {
    root /usr/share/nginx/html;
  }
}
