version: "3.9"

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  clearpath-net:
    driver: bridge

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  localstack-data:
    driver: local

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # --------------------------------------------------------------------------
  # Backend — Node.js / Express EDI API
  # --------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: clearpath-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 8080
      # Override endpoints to point to LocalStack in the dev environment
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      - clearpath-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # --------------------------------------------------------------------------
  # LocalStack — local AWS service emulation
  # --------------------------------------------------------------------------
  localstack:
    image: localstack/localstack:latest
    container_name: clearpath-localstack
    restart: unless-stopped
    ports:
      - "4566:4566"      # unified gateway
      - "4510-4559:4510-4559"  # legacy service ports (optional)
    environment:
      SERVICES: cognito,dynamodb,s3,sqs,ses
      DEBUG: 0
      DATA_DIR: /var/lib/localstack/data
      PERSIST_ALL: 1
      LAMBDA_EXECUTOR: local
      DEFAULT_REGION: us-east-1
      # Disable SSL for local dev simplicity
      USE_SSL: 0
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - clearpath-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # --------------------------------------------------------------------------
  # Frontend — static files served by Nginx
  # --------------------------------------------------------------------------
  frontend:
    image: nginx:alpine
    container_name: clearpath-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - clearpath-net
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
