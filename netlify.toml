# netlify.toml — ClearPath EDI Portal deployment config
# ─────────────────────────────────────────────────────────────────────────────
# Set these environment variables in the Netlify UI → Site Settings → Env vars:
#
#   BACKEND_URL   Full URL of your backend API, e.g. https://api.clearpath-edi.com
#                 (no trailing slash)
#
# Optional:
#   API_URL       Overrides the JS window.ENV.API_URL injected into env.js.
#                 Leave blank to use the Netlify proxy (recommended — no CORS).
# ─────────────────────────────────────────────────────────────────────────────

[build]
  # Netlify serves everything inside frontend/ as the website root
  publish = "frontend"

  # Regenerate env.js from environment variables on every deploy.
  # When API_URL is blank, the frontend uses relative /api/* paths and
  # the [[redirects]] proxy below forwards them to BACKEND_URL.
  command = "printf 'window.ENV={API_URL:\"%s\"};' \"${API_URL:-}\" > frontend/env.js"

[build.environment]
  NODE_VERSION = "18"

# ── API proxy ─────────────────────────────────────────────────────────────────
# Forwards /api/* from the browser to the backend server.
# Uses the BACKEND_URL env var set in Netlify's dashboard.
# "force = true" ensures this runs even when a file matches the path.
[[redirects]]
  from   = "/api/*"
  to     = ":BACKEND_URL/api/:splat"
  status = 200
  force  = true

# ── Clean URLs ────────────────────────────────────────────────────────────────
# /platform  →  /platform.html  (no .html needed in the URL)
[[redirects]]
  from   = "/platform"
  to     = "/platform.html"
  status = 200

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "SAMEORIGIN"
    X-Content-Type-Options     = "nosniff"
    X-XSS-Protection           = "1; mode=block"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"

# Long-cache for versioned static assets
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
